version: 2
updates:
  - package-ecosystem: npm
    directory: "/server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/client"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly

  # Keeps the pinned node:22-alpine digest current.
  # When Alpine releases a patched image, Dependabot opens a PR to bump the digest.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
