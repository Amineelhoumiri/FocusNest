version: 2
updates:
  - package-ecosystem: npm
    directory: "/server"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: npm
    directory: "/client"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly

  # Weekly PRs to bump the Dockerfile base image when node:22-alpine moves forward.
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
