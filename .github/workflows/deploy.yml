# Deploy to AWS: ECR push + App Runner deployment (OIDC — no long-lived AWS keys in GitHub)
#
# Prerequisites (AWS):
#   - ECR repository (e.g. focusnest)
#   - App Runner service using that ECR image (port 3000), VPC connector to reach private RDS
#   - IAM role for GitHub OIDC: trust token.actions.githubusercontent.com; allow ECR push +
#       apprunner:StartDeployment, apprunner:DescribeService, apprunner:ListOperations
#     (and ecr:GetAuthorizationToken, ecr:BatchCheckLayerAvailability, ecr:CompleteLayerUpload,
#      ecr:InitiateLayerUpload, ecr:PutImage, ecr:UploadLayerPart, ecr:BatchGetImage on the repo)
#
# GitHub repository secrets:
#   AWS_ROLE_ARN              — IAM role ARN for OIDC
#   AWS_REGION                — e.g. eu-west-2
#   ECR_REPOSITORY            — repo name (no registry prefix)
# Optional:
#   APPRUNNER_SERVICE_ARN     — full ARN of the App Runner service; if unset, only ECR push runs
#                               (use App Runner automatic deployments on :latest instead)
#
# GitHub repository variables:
#   PUBLIC_APP_URL            — public https origin for Vite build (same as App Runner URL or custom domain)

name: Deploy

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Push to ECR and start App Runner deployment
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # #region agent log — debug session bca148 (OIDC claims + raw STS; no JWT printed)
      - name: Debug — OIDC claims + aws sts assume-role-with-web-identity (bca148)
        id: oidc_debug
        env:
          AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          set -euo pipefail
          echo "github.repository=${{ github.repository }}"
          echo "github.ref=${{ github.ref }}"
          echo "github.event_name=${{ github.event_name }}"
          if [ -z "${AWS_ROLE_ARN:-}" ]; then
            echo "::error::AWS_ROLE_ARN secret is empty"
            exit 1
          fi
          ROLE_SHA=$(printf '%s' "$AWS_ROLE_ARN" | sha256sum | awk '{print $1}')
          echo "role_arn_sha256=${ROLE_SHA}"
          URL="${ACTIONS_ID_TOKEN_REQUEST_URL}"
          if [[ "${URL}" == *"?"* ]]; then
            REQ="${URL}&audience=sts.amazonaws.com"
          else
            REQ="${URL}?audience=sts.amazonaws.com"
          fi
          RESP=$(curl -sS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" "${REQ}")
          JWT=$(echo "$RESP" | jq -r '.value')
          export JWT
          python3 - <<'PY'
          import json, base64, os, sys
          jwt = os.environ.get("JWT", "")
          parts = jwt.split(".")
          if len(parts) < 2:
              print("::error::OIDC response missing JWT")
              sys.exit(1)
          pad = "=" * (-len(parts[1]) % 4)
          raw = parts[1] + pad
          data = json.loads(base64.urlsafe_b64decode(raw.encode("ascii")))
          aud = data.get("aud")
          out = {
              "sub": data.get("sub"),
              "aud": aud,
              "aud_type": type(aud).__name__,
              "iss": data.get("iss"),
              "repository": data.get("repository"),
              "ref": data.get("ref"),
          }
          with open("oidc-debug.json", "w", encoding="utf-8") as f:
              json.dump(out, f, indent=2)
          print("OIDC_CLAIMS_JSON=" + json.dumps(out))
          PY
          set +e
          aws sts assume-role-with-web-identity \
            --role-arn "$AWS_ROLE_ARN" \
            --role-session-name "bca148-debug" \
            --web-identity-token "$JWT" \
            --duration-seconds 900 \
            --output json > sts-ok.json 2> sts-err.txt
          echo $? > sts-exit.txt
          set -e
          echo "--- sts-exit.txt ---"
          cat sts-exit.txt
          echo "--- sts-err.txt (AWS message; no secrets) ---"
          cat sts-err.txt || true

      - name: Upload OIDC/STS debug artifact (bca148)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: oidc-sts-debug-bca148
          if-no-files-found: warn
          path: |
            oidc-debug.json
            sts-exit.txt
            sts-err.txt
            sts-ok.json
      # #endregion

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}
          audience: sts.amazonaws.com

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          echo "IMAGE_TAG=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build locally first so Trivy can scan before anything reaches ECR
      - name: Build image (local)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: focusnest:deploy
          build-args: |
            VITE_API_URL=${{ vars.PUBLIC_APP_URL }}
            VITE_POSTHOG_KEY=${{ secrets.VITE_POSTHOG_KEY }}
            VITE_POSTHOG_HOST=${{ vars.VITE_POSTHOG_HOST }}

      # Gate: block the deploy if the image has fixable HIGH/CRITICAL CVEs
      - name: Trivy — security gate
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: focusnest:deploy
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          trivyignores: .trivyignore

      # Only push to ECR after the image is confirmed clean
      - name: Push to ECR
        run: |
          docker tag focusnest:deploy ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.meta.outputs.IMAGE_TAG }}
          docker tag focusnest:deploy ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest
          docker push ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:${{ steps.meta.outputs.IMAGE_TAG }}
          docker push ${{ steps.ecr.outputs.registry }}/${{ secrets.ECR_REPOSITORY }}:latest

      - name: Start App Runner deployment
        id: deploy
        env:
          SERVICE_ARN: ${{ secrets.APPRUNNER_SERVICE_ARN }}
        run: |
          if [ -z "${SERVICE_ARN}" ]; then
            echo "::notice::APPRUNNER_SERVICE_ARN not set — image pushed to ECR only. Either add the secret or turn on automatic deployment for :latest in the App Runner console."
            exit 0
          fi
          aws apprunner start-deployment \
            --service-arn "${SERVICE_ARN}" \
            --region "${{ secrets.AWS_REGION }}"
          # Print the service URL so you can verify env vars are correct
          URL=$(aws apprunner describe-service \
            --service-arn "${SERVICE_ARN}" \
            --region "${{ secrets.AWS_REGION }}" \
            --query "Service.ServiceUrl" \
            --output text)
          echo "::notice::App Runner URL: https://${URL}"
          echo "::notice::Required env vars on the service — verify in App Runner console:"
          echo "::notice::  BETTER_AUTH_URL  = https://${URL}"
          echo "::notice::  CLIENT_URL       = https://${URL}"
          echo "::notice::  SPOTIFY_REDIRECT_URI = https://${URL}/api/spotify/callback"
