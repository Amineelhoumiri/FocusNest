name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

permissions:
  contents: read
  pull-requests: read

# Cancel any in-progress run for the same ref so a push to dev with an open PR
# doesn't fire two concurrent runs that race on the Docker layer cache.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Block PRs that introduce vulnerable dependencies (GitHub Dependency Graph) ───
  dependency-review:
    name: Security — dependency review (PR)
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high
          comment-summary-in-pr: on-failure

  # ─── Secret scanning in git history for this checkout ───
  gitleaks:
    name: Security — Gitleaks (secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─── Dockerfile best practices ───
  hadolint:
    name: Security — Hadolint (Dockerfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

  # ─── GitHub CodeQL static analysis (JavaScript/TypeScript) ───
  codeql:
    name: Security — CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript-typescript"]
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended,security-and-quality

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        # If code scanning is not enabled in repo settings, upload will fail.
        # Keep CI green while you enable it (Settings → Code security and analysis → Code scanning).
        continue-on-error: true
        with:
          category: "/language:${{matrix.language}}"

  server-test:
    name: Server — test & audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Jest
        run: npm test
        env:
          NODE_ENV: test

      # Fails the job if any CRITICAL advisory is present (blocking)
      - name: npm audit — CRITICAL (blocking)
        run: npm audit --audit-level=critical

      # Informational: HIGH+ listed but does not fail (tune to blocking later if desired)
      - name: npm audit — HIGH+ (report only)
        run: npm audit --audit-level=high
        continue-on-error: true

  client-test:
    name: Client — build, test, lint, audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Vitest
        run: npm test

      - name: ESLint
        run: npm run lint

      - name: npm audit — CRITICAL (blocking)
        run: npm audit --audit-level=critical

      - name: npm audit — HIGH+ (report only)
        run: npm audit --audit-level=high
        continue-on-error: true

  docker-build:
    name: Docker — build & scan
    runs-on: ubuntu-latest
    needs: [server-test, client-test]
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: focusnest:ci
          build-args: |
            VITE_API_URL=http://localhost:3000

      # Full report (does not fail the job)
      - name: Trivy — report (table)
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: focusnest:ci
          format: table
          exit-code: "0"
          severity: UNKNOWN,LOW,MEDIUM,HIGH,CRITICAL
          scanners: vuln

      # Blocking: fail only on actionable HIGH/CRITICAL vuln findings.
      # Use table output so the failing vulnerabilities are visible in the CI log.
      # Uses .trivyignore for team-reviewed, context-specific accepts (see file comments).
      - name: Trivy — gate HIGH and CRITICAL
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: focusnest:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          trivyignores: .trivyignore

      # Non-blocking: upload SARIF for GitHub Security tab (best-effort)
      - name: Trivy — SARIF (upload)
        uses: aquasecurity/trivy-action@v0.35.0
        if: always()
        with:
          image-ref: focusnest:ci
          format: sarif
          output: trivy-results.sarif
          exit-code: "0"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          scanners: vuln
          limit-severities-for-sarif: true
          trivyignores: .trivyignore

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-results.sarif') != ''
        continue-on-error: true
        with:
          sarif_file: trivy-results.sarif
