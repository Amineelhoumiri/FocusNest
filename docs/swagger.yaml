          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Messages retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ChatMessage'
        '404':
          description: Chat session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - AI Chat
      summary: Send message in chat session
      description: |-
        Add a new message to the chat session and receive AI response.
        
        **Encryption:** Message content is encrypted at rest using AWS KMS ALE.
        **Usage Tracking:** Token counts and costs are logged to OPENAI_USAGE table.
      operationId: sendChatMessage
      security:
        - bearerAuth: []
      parameters:
        - name: chat_session_id
          in: path
