  /spotify/auth/url:
    get:
      tags:
        - Spotify Integration
      summary: Get Spotify OAuth authorization URL
      description: Generate authorization URL for Spotify OAuth flow
      operationId: getSpotifyAuthUrl
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Authorization URL generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  auth_url:
                    type: string
                    format: uri
                    example: 'https://accounts.spotify.com/authorize?client_id=...'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /spotify/callback:
    post:
      tags:
        - Spotify Integration
      summary: Handle Spotify OAuth callback
      description: |-
        Exchange authorization code for access/refresh tokens.
        
        **Encryption:** All tokens (access_token, refresh_token, spotify_user_id) are 
        encrypted at rest using AWS KMS ALE before storage in SPOTIFY_ACCOUNTS table.
      operationId: handleSpotifyCallback
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
              properties:
                code:
                  type: string
                  description: Authorization code from Spotify
      responses:
        '201':
          description: Spotify account linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SpotifyAccount'
        '400':
          description: Invalid authorization code
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /spotify/account:
    get:
      tags:
        - Spotify Integration
      summary: Get linked Spotify account
      description: Retrieve user's linked Spotify account details (tokens are NOT exposed)
      operationId: getSpotifyAccount
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Spotify account found
          content:
            application/json:
              schema:
                type: object
                properties:
                  spotify_acc_id:
                    type: string
                    format: uuid
                  spotify_user_id:
                    type: string
                    description: 'Decrypted Spotify user ID'
                  expires_at:
                    type: string
                    format: date-time
                  scopes:
                    type: string
                    example: 'user-read-playback-state user-modify-playback-state'
        '404':
          description: No Spotify account linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Spotify Integration
      summary: Unlink Spotify account
      description: Remove Spotify integration and delete all encrypted tokens
      operationId: unlinkSpotifyAccount
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Spotify account unlinked
        '404':
          description: No Spotify account linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /spotify/refresh:
    post:
      tags:
        - Spotify Integration
      summary: Refresh Spotify access token
      description: |-
        Use refresh token to obtain a new access token.
        
        **Token Refresh Logic:**
        1. Retrieve encrypted refresh_token from SPOTIFY_ACCOUNTS
        2. Decrypt using AWS KMS
        3. Exchange with Spotify API for new access_token
        4. Encrypt and update access_token and expires_at in DB
      operationId: refreshSpotifyToken
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  expires_at:
                    type: string
                    format: date-time
                    description: New expiration timestamp
        '404':
          description: No Spotify account linked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Token refresh failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

