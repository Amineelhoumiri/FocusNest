          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /consent:
    post:
      tags:
        - Admin & Auditing
      summary: Update consent preferences
      description: |-
        Record user consent for data processing activities.
        Each consent change is logged in CONSENT_AUDIT_LOG with timestamp and policy version.
      operationId: updateConsent
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - consent_type
                - consent_value
                - policy_version
              properties:
                consent_type:
                  type: string
                  enum: [core, ai, spotify]
                  description: 'Type of consent being granted/revoked'
                consent_value:
                  type: boolean
                  description: 'true = consent granted, false = consent revoked'
                policy_version:
                  type: string
