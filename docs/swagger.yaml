openapi: 3.0.4
info:
  title: FocusNest API
  description: |-
    FocusNest is a neuro-cognitive productivity application that combines task management, 
    focus sessions, AI-powered coaching, and personalized soundscapes to help users achieve 
    deep work states.
    
    **Security Architecture:**
    - All sensitive fields (emails, task names, chat content, Spotify tokens) are encrypted 
      at rest using AWS KMS Application Layer Encryption (ALE)
    - API handles plaintext; encryption/decryption occurs at the service layer before DB persistence
    - JWT Bearer tokens required for all authenticated endpoints
    
    **Key Features:**
    - Kanban-style task management with energy-level filtering
    - 5-minute Micro-Timer sessions with No-Shame Reflection
    - AI chat sessions with GPT-4 integration
    - Spotify integration for focus soundscapes
    - GDPR-compliant data deletion with CASCADE rules
    
    **Compliance:**
    - GDPR Article 17 (Right to Erasure) via `/user/nuke` endpoint
    - Consent audit trail for core, AI, and Spotify data processing
    - IP address hashing for OpenAI usage logs
  termsOfService: 'https://focusnest.app/terms'
  contact:
    email: medamineelhoumiri@gmail.com
    name: FocusNest Engineering Team
  license:
    name: MIT
    url: 'https://opensource.org/licenses/MIT'
  version: 1.0.0
externalDocs:
  description: FocusNest Developer Documentation
  url: 'https://docs.focusnest.app'
servers:
  - description: Production API
    url: 'https://api.focusnest.app/v1'
  - description: Staging Environment
    url: 'https://api-staging.focusnest.app/v1'
  - description: SwaggerHub API Auto Mocking
    url: 'https://virtserver.swaggerhub.com/uniwork-41e/FocusNestapi/1.0.0'
tags:
  - name: Identity & Accounts
    description: User authentication, profile management, and account lifecycle
  - name: Tasks & Planning
    description: Kanban board operations for tasks and subtasks with energy-level filtering
  - name: Focus Sessions
    description: 5-minute Micro-Timer sessions with reflection logging and concurrency control
  - name: AI Chat
    description: GPT-4 powered coaching sessions with encrypted message history
  - name: Spotify Integration
    description: OAuth token management and refresh for personalized soundscapes
  - name: Admin & Auditing
    description: System prompt management, usage tracking, and consent audit logs
paths:
  /auth/register:
    post:
      tags:
        - Identity & Accounts
      summary: Register new user
      description: Create a new user account with encrypted email and hashed password
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
                - full_name
              properties:
                email:
                  type: string
                  format: email
                  description: 'Email address (encrypted at rest using AWS KMS ALE)'
                  example: 'user@example.com'
                password:
                  type: string
                  format: password
                  minLength: 8
                  description: 'Password (hashed with bcrypt before storage)'
                  example: 'SecureP@ssw0rd!'
                full_name:
                  type: string
                  example: 'Jane Doe'
                date_of_birth:
                  type: string
                  format: date
                  description: 'Date of birth (encrypted at rest)'
                  example: '1995-06-15'
                address:
                  type: string
                  example: '123 Focus Lane, London, UK'
      responses:
        '201':
          description: |-
            User successfully registered.
            
            **Token Delivery:** JWT access token and refresh token are delivered via HttpOnly cookies
            and are NOT present in the response body. This prevents XSS attacks from stealing tokens.
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
        '400':
          description: Invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/login:
    post:
      tags:
        - Identity & Accounts
      summary: User login
      description: |-
        Authenticate user and issue JWT tokens.
        
        **Token Delivery:** The JWT access token and refresh token are delivered via HttpOnly cookies
        and are NOT present in the response body. This prevents XSS attacks from stealing tokens.
        The response body only returns user_id and expires_in.
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  format: password
      responses:
        '200':
          description: Login successful (tokens delivered via HttpOnly cookies)
          content:
            application/json:
              schema:
                type: object
                properties:
                  user_id:
                    type: string
                    format: uuid
                  expires_in:
                    type: integer
                    example: 3600
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/refresh:
    post:
      tags:
        - Identity & Accounts
      summary: Refresh access token
      description: Generate new access token using refresh token
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refresh_token
              properties:
                refresh_token:
                  type: string
      responses:
        '200':
          description: Token refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  expires_in:
                    type: integer
        '401':
          description: Invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /auth/logout:
    post:
      tags:
        - Identity & Accounts
      summary: Logout user and invalidate refresh token
      description: |-
        Invalidates the current refresh token by marking it as revoked server-side.
        Clears the HttpOnly cookie.
        
        **Token Revocation Architecture:**
        Refresh tokens are stored server-side in a REFRESH_TOKENS table and marked
        is_revoked: true on logout. This prevents stolen tokens from being used after
        the user logs out, providing an additional security layer beyond token expiration.
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Logout successful, refresh token revoked
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me:
    get:
      tags:
        - Identity & Accounts
      summary: Get current user profile
      description: Retrieve authenticated user's profile information
      operationId: getCurrentUser
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - Identity & Accounts
      summary: Update user profile
      description: Modify user profile fields
      operationId: updateCurrentUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                full_name:
                  type: string
                date_of_birth:
                  type: string
                  format: date
                address:
                  type: string
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/{user_id}:
    get:
      tags:
        - Identity & Accounts
      summary: Get user by ID (Admin only)
      description: Retrieve any user's profile (admin privilege required)
      operationId: getUserById
      security:
        - bearerAuth: []
      parameters:
        - name: user_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '403':
          description: Forbidden - Admin only
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: User not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me/export:
    get:
      tags:
        - Identity & Accounts
      summary: Export all user data (GDPR Data Portability)
      description: |-
        Returns a structured JSON file download containing the user's complete data:
        - Full profile information
        - All tasks and subtasks
        - All session history and reflection logs
        - Chat session history (encrypted content is decrypted for export)
        - Consent audit trail
        
        This endpoint implements GDPR Article 20 (Right to Data Portability).
        Response is delivered as a downloadable JSON file via Content-Disposition: attachment header.
      operationId: exportUserData
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User data export file
          headers:
            Content-Disposition:
              schema:
                type: string
                example: 'attachment; filename="focusnest-export-2026-02-24.json"'
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
                  tasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Task'
                  subtasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subtask'
                  sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/Session'
                  chat_sessions:
                    type: array
                    items:
                      $ref: '#/components/schemas/ChatSession'
                  consent_history:
                    type: array
                    items:
                      $ref: '#/components/schemas/ConsentAuditLog'
                  exported_at:
                    type: string
                    format: date-time
                    example: '2026-02-24T10:30:00Z'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /users/me/nuke:
    delete:
      tags:
        - Identity & Accounts
      summary: GDPR Right to Erasure (User Nuke)
      description: |-
        **CRITICAL OPERATION - IRREVERSIBLE**
        
        This endpoint permanently deletes all user data across the entire system via database CASCADE rules:
        - USER record deletion triggers ON DELETE CASCADE for:
          - ACCOUNT (email, password)
          - TASK and SUBTASK records
          - SESSION records (focus history)
          - CHAT_SESSIONS and CHAT_MESSAGES (AI conversation history)
          - SPOTIFY_ACCOUNTS (OAuth tokens)
          - OPENAI_USAGE (cost logs)
          - CONSENT_AUDIT_LOG (consent history)
        
        This endpoint implements GDPR Article 17 (Right to Erasure).
        Users must confirm deletion by providing their password.
      operationId: nukeUser
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - password_confirmation
              properties:
                password_confirmation:
                  type: string
                  format: password
                  description: User must re-enter password to confirm deletion
      responses:
        '204':
          description: User and all associated data permanently deleted
        '401':
          description: Invalid password confirmation
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '403':
          description: Action forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks:
    get:
      tags:
        - Tasks & Planning
      summary: List all tasks for current user
      description: Retrieve user's tasks with optional filtering by status and energy level
      operationId: listTasks
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [Backlog, Ready, Doing, Done]
        - name: energy_level
          in: query
          schema:
            type: string
            enum: [High, Low]
      responses:
        '200':
          description: Tasks retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Tasks & Planning
      summary: Create new task
      description: |-
        Add a new task to the Kanban board.
        
        **Encryption Note:** `task_name` is sent as plaintext in the request but 
        encrypted using AWS KMS ALE before being stored .
      operationId: createTask
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - task_name
                - status
                - energy_level
              properties:
                task_name:
                  type: string
                  description: 'Plaintext task name (encrypted at rest via AWS KMS ALE)'
                  example: 'Complete Q1 financial report'
                status:
                  type: string
                  enum: [Backlog, Ready, Doing, Done]
                  default: Backlog
                energy_level:
                  type: string
                  enum: [High, Low]
                  description: 'Energy level required to complete this task'
      responses:
        '201':
          description: Task created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tasks/{task_id}:
    get:
      tags:
        - Tasks & Planning
      summary: Get task by ID
      description: Retrieve a specific task with decrypted task_name
      operationId: getTaskById
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - Tasks & Planning
      summary: Update task
      description: Modify task properties (status, energy level, or name)
      operationId: updateTask
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                task_name:
                  type: string
                status:
                  type: string
                  enum: [Backlog, Ready, Doing, Done]
                energy_level:
                  type: string
                  enum: [High, Low]
      responses:
        '200':
          description: Task updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: |-
            **Conflict - Single-task enforcement violation**
            
            Another task is already in "Doing" status. Only one task can be in Doing
            at a time to enforce single-task focus. Complete or move the current task
            before starting a new one.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'SINGLE_TASK_VIOLATION'
                  message:
                    type: string
                    example: 'Another task is already in Doing status. Complete or move it before starting a new one.'
                  conflicting_task_id:
                    type: string
                    format: uuid
                    description: ID of the task currently in Doing status
    delete:
      tags:
        - Tasks & Planning
      summary: Delete task
      description: Permanently delete a task and all associated subtasks (CASCADE)
      operationId: deleteTask
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Task deleted
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /tasks/{task_id}/subtasks:
    get:
      tags:
        - Tasks & Planning
      summary: List subtasks for a task
      description: Retrieve all subtasks belonging to a parent task
      operationId: listSubtasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Subtasks retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subtask'
        '404':
          description: Parent task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    post:
      tags:
        - Tasks & Planning
      summary: Create subtask
      description: Add a subtask to a parent task
      operationId: createSubtask
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subtask_name
              properties:
                subtask_name:
                  type: string
                  description: 'Plaintext subtask name (encrypted at rest via AWS KMS ALE)'
                  example: 'Gather revenue data from Q1'
                status:
                  type: string
                  default: 'pending'
                energy_level:
                  type: string
                  example: 'High'
                is_approved:
                  type: boolean
                  default: false
      responses:
        '201':
          description: Subtask created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subtask'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Parent task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tasks/{task_id}/generate-breakdown:
    post:
      tags:
        - Tasks & Planning
      summary: Generate AI subtask breakdown (preview only)
      description: |-
        **Two-Phase AI Breakdown Flow - Phase 1: Preview**
        
        Sends the task to OpenAI and returns a preview list of suggested subtasks WITHOUT saving them.
        Response is an array of subtask objects with is_approved: false. No DB write happens here.
        
        Users can review the AI suggestions before committing them to the database via the
        approve-all endpoint.
      operationId: generateTaskBreakdown
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: AI-generated subtask suggestions (preview only, not saved)
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  suggested_subtasks:
                    type: array
                    items:
                      type: object
                      properties:
                        subtask_name:
                          type: string
                          example: 'Gather Q1 revenue data'
                        energy_level:
                          type: string
                          enum: [High, Low]
                          example: 'Low'
                        is_approved:
                          type: boolean
                          example: false
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: OpenAI API error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /tasks/{task_id}/subtasks/approve-all:
    post:
      tags:
        - Tasks & Planning
      summary: Approve and save AI-generated subtasks
      description: |-
        **Two-Phase AI Breakdown Flow - Phase 2: Commit**
        
        Takes the previewed subtasks in the request body and saves them all to the DB
        with is_approved: true. This is what actually populates the Kanban board.
        
        The subtasks must be provided in the request body (typically from the
        generate-breakdown response).
      operationId: approveAllSubtasks
      security:
        - bearerAuth: []
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - subtasks
              properties:
                subtasks:
                  type: array
                  items:
                    type: object
                    required:
                      - subtask_name
                      - energy_level
                    properties:
                      subtask_name:
                        type: string
                      energy_level:
                        type: string
                        enum: [High, Low]
      responses:
        '201':
          description: All subtasks saved with is_approved=true
          content:
            application/json:
              schema:
                type: object
                properties:
                  task_id:
                    type: string
                    format: uuid
                  created_subtasks:
                    type: array
                    items:
                      $ref: '#/components/schemas/Subtask'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /subtasks/{subtask_id}:
    get:
      tags:
        - Tasks & Planning
      summary: Get subtask by ID
      description: Retrieve a specific subtask
      operationId: getSubtaskById
      security:
        - bearerAuth: []
      parameters:
        - name: subtask_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Subtask found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subtask'
        '404':
          description: Subtask not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    patch:
      tags:
        - Tasks & Planning
      summary: Update subtask
      description: |-
        Modify subtask properties.
        
        **Subtask Approval Flow:**
        Setting is_approved: true is what promotes an AI-generated subtask onto the active
        Kanban board. Subtasks generated by the AI breakdown flow land with is_approved: false
        and are invisible to the board until approved.
      operationId: updateSubtask
      security:
        - bearerAuth: []
      parameters:
        - name: subtask_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                subtask_name:
                  type: string
                status:
                  type: string
                energy_level:
                  type: string
                is_approved:
                  type: boolean
      responses:
        '200':
          description: Subtask updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Subtask'
        '400':
          description: Invalid input
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '404':
          description: Subtask not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    delete:
      tags:
        - Tasks & Planning
      summary: Delete subtask
      description: Permanently delete a subtask
      operationId: deleteSubtask
      security:
        - bearerAuth: []
      parameters:
        - name: subtask_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Subtask deleted
        '404':
          description: Subtask not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /sessions:
    get:
      tags:
        - Focus Sessions
      summary: List focus sessions
      description: Retrieve user's session history with optional filtering
      operationId: listSessions
      security:
        - bearerAuth: []
      parameters:
        - name: is_active
          in: query
          schema:
            type: boolean
          description: Filter by active/completed sessions
        - name: task_id
          in: query
          schema:
            type: string
            format: uuid
          description: Filter sessions by task
      responses:
        '200':
          description: Sessions retrieved
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Session'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /sessions/start:
    post:
      tags:
        - Focus Sessions
      summary: Start 5-minute Micro-Timer session
      description: |-
        Begin a new focus session tied to a specific task.
        
        **Concurrency Guard:** Only one active session per user is allowed at a time.
        If the user already has an active session, this endpoint returns `409 Conflict`.
        
        The session remains active until explicitly ended via `/sessions/{session_id}/end`.
      operationId: startSession
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - task_id
              properties:
                task_id:
                  type: string
                  format: uuid
                  description: Task to focus on during this session
      responses:
        '201':
          description: Session started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: Invalid task_id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: |-
            **Conflict - Active session already exists**
            
            User already has an active focus session. Only one session can be active 
            at a time to enforce single-task focus. End the current session before 
            starting a new one.
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'ACTIVE_SESSION_EXISTS'
                  message:
                    type: string
                    example: 'You already have an active session. Please end it before starting a new one.'
                  active_session_id:
                    type: string
                    format: uuid
                    description: ID of the currently active session
  /sessions/{session_id}/end:
    post:
      tags:
        - Focus Sessions
      summary: End session with optional No-Shame Reflection
      description: |-
        Mark a session as complete and optionally log a reflection.
        
        **No-Shame Reflection Logic:**
        - Users can log reflections for distraction, low energy, or external interruptions
        - Reflection content is encrypted at rest using AWS KMS ALE
        - `outcome` field captures success/partial/incomplete status
      operationId: endSession
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                outcome:
                  type: string
                  enum: [success, partial, incomplete]
                  description: Session completion status
                  default: success
                reflection_type:
                  type: string
                  enum: [Distraction, Low Energy, External]
                  description: Type of reflection (optional)
                reflection_content:
                  type: string
                  description: |-
                    No-Shame reflection notes (plaintext sent, encrypted at rest via AWS KMS ALE).
                    Example: "Got distracted by Slack notifications - need to enable DND mode"
      responses:
        '200':
          description: Session ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Session already ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /sessions/{session_id}/switch:
    post:
      tags:
        - Focus Sessions
      summary: Session Switch ("I'm Stuck" feature)
      description: |-
        Pauses the current High-Energy task and swaps in a Low-Energy task from the backlog
        without stopping the session timer.
        
        This endpoint updates the session's task_id in place, allowing users to pivot
        when they hit a mental block without losing their active session state.
        
        **Validation:** The new_task_id must reference a task with energy_level='Low'.
        Returns 400 if the new task's energy_level is not Low.
      operationId: switchSessionTask
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - new_task_id
              properties:
                new_task_id:
                  type: string
                  format: uuid
                  description: 'The Low-Energy task to switch to'
      responses:
        '200':
          description: Session task switched successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          description: |-
            Invalid task - new task must have energy_level='Low'
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: 'INVALID_TASK_ENERGY_LEVEL'
                  message:
                    type: string
                    example: 'Task must be Low-Energy to use session switch'
        '404':
          description: Session or task not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Session already ended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
  /sessions/{session_id}:
    get:
      tags:
        - Focus Sessions
      summary: Get session by ID
      description: Retrieve session details including decrypted reflection content
      operationId: getSessionById
      security:
        - bearerAuth: []
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          description: Session not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

