# Local Postgres for development (avoids RDS timeouts from your laptop).
# Usage:
#   docker compose up -d
# Then in server/.env point DB_* at 127.0.0.1 and DB_PORT=5433 (mapped below).
# Apply schema/migrations with psql as needed (see server/scripts/migrations/).

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: focusnest
    ports:
      - "5433:5432"
    volumes:
      - focusnest_dev_pg:/var/lib/postgresql/data

volumes:
  focusnest_dev_pg:
